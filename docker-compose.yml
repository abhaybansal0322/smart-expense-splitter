services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smart_expense_splitter}
      POSTGRES_USER: ${POSTGRES_USER:-smart_expense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smart_expense_password}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: tools
    command: ['npx', 'drizzle-kit', 'push']
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://smart_expense:smart_expense_password@db:5432/smart_expense_splitter}
    depends_on:
      db:
        condition: service_healthy
    restart: 'no'

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '${APP_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://smart_expense:smart_expense_password@db:5432/smart_expense_splitter}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-replace-this-with-a-32-byte-secret}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres-data:
